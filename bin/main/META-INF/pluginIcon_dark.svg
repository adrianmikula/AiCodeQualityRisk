<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Jakarta EE Transition Icon - Dark theme version -->
  <!-- Colors: Dark gray #2D2D2D, Teal #4DD0E1, Orange #FF9800 -->
  
  <!-- Base - dark rounded square with 2px padding -->
  <rect x="2" y="2" width="36" height="36" rx="3" fill="#2D2D2D" />
  
  <!-- Cube top face -->
  <polygon points="20,6 34,12 20,18 6,12" fill="#4DD0E1" />
  
  <!-- Cube left face - orange transition -->
  <polygon points="6,12 20,18 20,30 6,24" fill="#FF9800" />
  
  <!-- Cube right face -->
  <polygon points="34,12 20,18 20,30 34,24" fill="#424242" />
  
  <!-- Highlight on top -->
  <polygon points="20,6 28,10 20,12 12,10" fill="#80DEEA" />
</svg>