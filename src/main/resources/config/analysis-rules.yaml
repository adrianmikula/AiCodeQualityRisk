rules:
  - name: "todo_marker"
    pattern:
      type: "complex"
      conditions:
        - type: "contains"
          target: "diffText"
          value: "TODO"
        - type: "contains"
          target: "fileSnapshot"
          value: "TODO"
    scoreDelta: 8
    category: "COMPLEXITY"
    finding:
      title: "Deferred work marker detected"
      detail: "TODO markers often indicate incomplete behavior in changed code."
      severity: "LOW"

  - name: "null_assertion"
    pattern:
      type: "contains"
      target: "fileSnapshot"
      value: "!!"
    scoreDelta: 30
    category: "SECURITY"
    finding:
      title: "Potential null safety issue"
      detail: "Non-null assertion detected (`!!`), which may throw at runtime."
      severity: "HIGH"

  - name: "broad_exception"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "catch\\s*\\(.*Exception"
    scoreDelta: 18
    category: "SECURITY"
    finding:
      title: "Broad exception catch"
      detail: "Catching broad Exception can hide root causes and reduce recoverability."
      severity: "MEDIUM"

  - name: "plaintext_password_comparison"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "\\.equals\\s*\\(.*(?:password|passwd|pwd|pass|secret|token)\\)|==\\s*(?:password|passwd|pwd|pass|secret|token)|(?:password|passwd|pwd|pass|secret|token)\\s*==|compareTo\\s*\\(.*(?:password|passwd|pwd|pass|secret|token)"
    scoreDelta: 25
    category: "SECURITY"
    finding:
      title: "Plaintext password comparison detected"
      detail: "Comparing passwords using .equals() or == instead of using a proper password encoder is insecure. AI tends to copy this anti-pattern from insecure examples."
      severity: "HIGH"

  - name: "hardcoded_api_token"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "(sk-|pk-|AKIA|AIza|ya29|ghp_|gho_|ghu_|ghs_|ghr_)[A-Za-z0-9]{10,}|Bearer\\s+[A-Za-z0-9-._~+/]+=*|Basic\\s+[A-Za-z0-9+/]+=*"
    scoreDelta: 30
    category: "SECURITY"
    finding:
      title: "Hardcoded API token detected"
      detail: "Hardcoded API keys, tokens, or credentials found in code. AI tends to copy insecure examples with embedded secrets."
      severity: "HIGH"

  - name: "placeholder_domain_in_code"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "(https?:\\/\\/)?(?:example\\.com|example\\.org|example\\.net|test\\.com|dev\\.com|staging\\.com)|localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\[::1\\]"
    scoreDelta: 20
    category: "SECURITY"
    finding:
      title: "Placeholder domain in production code"
      detail: "Placeholder domains like example.com or localhost found in code. AI often leaves these placeholders in production paths."
      severity: "HIGH"

  - name: "thread_sleep"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "Thread\\.sleep\\("
    scoreDelta: 12
    category: "PERFORMANCE"
    finding:
      title: "Blocking call in code path"
      detail: "Thread.sleep usage can create responsiveness and timing issues."
      severity: "MEDIUM"

  - name: "complex_change"
    pattern:
      type: "complex"
      conditions:
        - type: "regex"
          target: "diffText"
          value: "(?m)^\\+.*(if|for|while)\\s*\\("
        - type: "length"
          target: "diffText"
          operator: ">"
          value: 200
    scoreDelta: 14
    category: "COMPLEXITY"
    finding:
      title: "Complex change footprint"
      detail: "Large control-flow-heavy diff raises review and regression risk."
      severity: "MEDIUM"

  - name: "long_method"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.maxMethodLength"
          operator: ">"
          value: 50
    scoreDelta: 20
    category: "COMPLEXITY"
    finding:
      title: "Long method detected"
      detail: "Method exceeds 50 lines, making it harder to understand and maintain."
      severity: "MEDIUM"

  - name: "deep_nesting"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.maxNestingDepth"
          operator: ">"
          value: 3
    scoreDelta: 15
    category: "COMPLEXITY"
    finding:
      title: "Deep nesting detected"
      detail: "Code has deeply nested control structures (>3 levels), increasing complexity."
      severity: "MEDIUM"

  - name: "high_complexity"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.cyclomaticComplexity"
          operator: ">"
          value: 10
    scoreDelta: 25
    category: "COMPLEXITY"
    finding:
      title: "High cyclomatic complexity"
      detail: "Method has high cyclomatic complexity (>10), indicating multiple execution paths."
      severity: "HIGH"

  - name: "complex_method_flag"
    pattern:
      type: "complex"
      conditions:
        - type: "boolean"
          target: "ast.hasComplexMethods"
          value: true
    scoreDelta: 10
    category: "COMPLEXITY"
    finding:
      title: "Complex method structure"
      detail: "Code contains methods that may be difficult to test and maintain."
      severity: "LOW"

  - name: "duplicate_string_literals"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.duplicateStringLiteralCount"
          operator: ">"
          value: 2
    scoreDelta: 18
    category: "DUPLICATION"
    finding:
      title: "Repeated string literals"
      detail: "Repeated hard-coded strings may indicate copy/paste duplication or AI-generated boilerplate."
      severity: "MEDIUM"

  - name: "duplicate_number_literals"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.duplicateNumberLiteralCount"
          operator: ">"
          value: 2
    scoreDelta: 16
    category: "DUPLICATION"
    finding:
      title: "Repeated numeric literals"
      detail: "Repeated numbers can indicate copy/paste or mechanical AI-generated expressions."
      severity: "MEDIUM"

  - name: "hardcoded_configuration"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.hardcodedConfigLiteralCount"
          operator: ">"
          value: 0
    scoreDelta: 22
    category: "SECURITY"
    finding:
      title: "Hardcoded configuration detected"
      detail: "String literals appear to contain configuration values such as endpoints, secrets, or credentials."
      severity: "HIGH"

  - name: "broad_exception_catch_ast"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.broadCatchCount"
          operator: ">"
          value: 0
    scoreDelta: 20
    category: "SECURITY"
    finding:
      title: "Broad exception catch detected"
      detail: "Catching Exception or Throwable is often too broad and may hide runtime errors."
      severity: "HIGH"

  - name: "empty_catch_block"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.emptyCatchCount"
          operator: ">"
          value: 0
    scoreDelta: 16
    category: "SECURITY"
    finding:
      title: "Empty catch block"
      detail: "Silent exception handling can hide errors and make code harder to debug."
      severity: "MEDIUM"

  - name: "repeated_method_calls"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.duplicateMethodCallCount"
          operator: ">"
          value: 3
    scoreDelta: 18
    category: "DUPLICATION"
    finding:
      title: "Repeated method calls"
      detail: "Repeated method call names suggest duplicated logic or boilerplate generation."
      severity: "MEDIUM"

  - name: "heavy_boolean_logic"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.booleanOperatorCount"
          operator: ">"
          value: 3
    scoreDelta: 16
    category: "COMPLEXITY"
    finding:
      title: "Heavy boolean logic"
      detail: "Long boolean expressions can be hard to understand and maintain."
      severity: "MEDIUM"

  - name: "long_if_else_chain"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.maxElseIfChainLength"
          operator: ">"
          value: 2
    scoreDelta: 18
    category: "COMPLEXITY"
    finding:
      title: "Long if/else-if chain"
      detail: "Extended if/else-if chains increase branching complexity and often indicate generated decision logic."
      severity: "MEDIUM"

  - name: "magic_number_usage"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.magicNumberCount"
          operator: ">"
          value: 3
    scoreDelta: 16
    category: "PERFORMANCE"
    finding:
      title: "Magic numbers detected"
      detail: "Multiple bare numeric literals can signal brittle generated logic instead of named constants."
      severity: "MEDIUM"

  - name: "long_parameter_list"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.maxParameterCount"
          operator: ">"
          value: 4
    scoreDelta: 16
    category: "DUPLICATION"
    finding:
      title: "Large method signature"
      detail: "Methods with many parameters are harder to understand and more likely to be AI-generated glue code."
      severity: "MEDIUM"

  - name: "large_class_state"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.fieldCount"
          operator: ">"
          value: 8
    scoreDelta: 18
    category: "COMPLEXITY"
    finding:
      title: "Large class state"
      detail: "Classes with many fields often indicate bloated structures or generated boilerplate."
      severity: "MEDIUM"

  - name: "magic_number_usage"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.magicNumberCount"
          operator: ">"
          value: 3
    scoreDelta: 14
    category: "PERFORMANCE"
    finding:
      title: "Magic numbers detected"
      detail: "Multiple numeric literals are present, which can indicate brittle, copy/pasted logic or hidden assumptions."
      severity: "MEDIUM"

  - name: "long_parameter_list"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.maxParameterCount"
          operator: ">"
          value: 4
    scoreDelta: 16
    category: "DUPLICATION"
    finding:
      title: "Large method signature"
      detail: "Methods with many parameters are harder to understand and more likely to be AI-generated glue code."
      severity: "MEDIUM"

  - name: "large_class_state"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "ast.fieldCount"
          operator: ">"
          value: 8
    scoreDelta: 18
    category: "COMPLEXITY"
    finding:
      title: "Large class state"
      detail: "Classes with many fields often indicate bloated data structures or excessive generated state."
      severity: "MEDIUM"

  - name: "plaintext_password_comparison_ast"
    pattern:
      type: "complex"
      conditions:
        - type: "boolean"
          target: "ast.hasPlaintextPasswordComparison"
          value: true
    scoreDelta: 25
    category: "SECURITY"
    finding:
      title: "Plaintext password comparison detected (AST)"
      detail: "Password comparison using equals() or == detected. AI tends to copy this anti-pattern from insecure examples instead of using proper password encoders."
      severity: "HIGH"

  - name: "hardcoded_secret_ast"
    pattern:
      type: "complex"
      conditions:
        - type: "boolean"
          target: "ast.hasHardcodedSecrets"
          value: true
    scoreDelta: 30
    category: "SECURITY"
    finding:
      title: "Hardcoded secret detected (AST)"
      detail: "Hardcoded API keys, tokens, or credentials found in code. AI consistently copies insecure examples with embedded secrets."
      severity: "HIGH"

  - name: "placeholder_domain_ast"
    pattern:
      type: "complex"
      conditions:
        - type: "boolean"
          target: "ast.hasPlaceholderDomains"
          value: true
    scoreDelta: 20
    category: "SECURITY"
    finding:
      title: "Placeholder domain detected (AST)"
      detail: "Placeholder domains like example.com or localhost found in code. AI often leaves these placeholders in production paths."
      severity: "HIGH"

  - name: "corrupted_parse_failure"
    pattern:
      type: "complex"
      conditions:
        - type: "boolean"
          target: "corrupted.parseFailed"
          value: true
    scoreDelta: 30
    category: "CORRUPTION"
    finding:
      title: "Parse failure detected"
      detail: "File could not be parsed by both JavaParser and Tree-sitter. This indicates corrupted or non-Java content in a Java file."
      severity: "HIGH"

  - name: "corrupted_markdown_tokens"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "corrupted.markdownTokenCount"
          operator: ">"
          value: 0
    scoreDelta: 20
    category: "CORRUPTION"
    finding:
      title: "Markdown tokens detected"
      detail: "File contains markdown code fences or file path markers typical of AI-generated slop or incomplete code."
      severity: "MEDIUM"

  - name: "corrupted_unbalanced_braces"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "corrupted.unbalancedBraceCount"
          operator: ">"
          value: 2
    scoreDelta: 25
    category: "CORRUPTION"
    finding:
      title: "Unbalanced braces detected"
      detail: "File has unbalanced braces, brackets, or parentheses indicating incomplete or malformed code."
      severity: "HIGH"

  - name: "corrupted_mixed_language"
    pattern:
      type: "complex"
      conditions:
        - type: "numeric"
          target: "corrupted.mixedLanguageDensity"
          operator: ">"
          value: 0.3
    scoreDelta: 18
    category: "CORRUPTION"
    finding:
      title: "Mixed language content detected"
      detail: "File contains high density of prose-like text mixed with code, typical of AI-generated explanations or incomplete code."
      severity: "MEDIUM"

  - name: "null_propagation_pattern"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "\\.orElse\\s*\\(\\s*null\\s*\\)"
    scoreDelta: 15
    category: "COMPLEXITY"
    finding:
      title: "Null propagation pattern detected"
      detail: ".orElse(null) chains indicate nullable return flows that can propagate through the system. AI tends to generate architectures built on null-return flows."
      severity: "MEDIUM"

  - name: "null_propagation_ast"
    pattern:
      type: "complex"
      conditions:
        - type: "boolean"
          target: "ast.hasNullReturns"
          value: true
    scoreDelta: 20
    category: "COMPLEXITY"
    finding:
      title: "Excessive null returns detected (AST)"
      detail: "Code contains excessive .orElse(null) patterns or long null propagation chains. This indicates systemic null handling issues often found in AI-generated code."
      severity: "MEDIUM"

  # Scala-specific rules
  - name: "scala_pattern_matching_complexity"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "match\\s*\\{[^}]{50,}"
    scoreDelta: 18
    category: "COMPLEXITY"
    finding:
      title: "Complex pattern matching detected"
      detail: "Large pattern match expressions can be hard to understand and maintain. Consider breaking into smaller functions."
      severity: "MEDIUM"

  - name: "scala_implicit_usage"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "implicit\\s+(?:val|def|class|object)"
    scoreDelta: 14
    category: "COMPLEXITY"
    finding:
      title: "Implicit usage detected"
      detail: "Implicit parameters and conversions can make code harder to understand and debug. Use explicit parameters where possible."
      severity: "MEDIUM"

  - name: "scala_for_comprehension_nesting"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "for\\s*\\{[^}]*;[^}]*;[^}]*\\}"
    scoreDelta: 16
    category: "COMPLEXITY"
    finding:
      title: "Nested for-comprehension detected"
      detail: "Deeply nested for-comprehensions can be hard to read. Consider flattening or using helper functions."
      severity: "MEDIUM"

  - name: "scala_case_class_boilerplate"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "case\\s+class\\s+\\w+\\([^)]{100,}"
    scoreDelta: 12
    category: "DUPLICATION"
    finding:
      title: "Large case class detected"
      detail: "Case classes with many parameters may indicate data structure bloat. Consider splitting into smaller classes or using tuples."
      severity: "LOW"

  - name: "scala_option_get"
    pattern:
      type: "regex"
      target: "fileSnapshot"
      value: "\\.get\\s*\\)|\\.getOrElse\\s*\\(null\\)"
    scoreDelta: 20
    category: "SECURITY"
    finding:
      title: "Unsafe Option.get usage"
      detail: "Using .get or .getOrElse(null) on Options can cause runtime exceptions. Use pattern matching or safe alternatives like .getOrElse(default)."
      severity: "HIGH"