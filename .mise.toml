[tools]
java = "17"

[tasks]
build = "mise-build.bat build"
test = "mise-build.bat test"
run-ide = "mise-build.bat runIde"
run = "mise-build.bat runIde"
clean = "mise-build.bat clean"
check = "mise-build.bat check"
assemble = "mise-build.bat assemble"
install = "mise-build.bat installDist"
gen = "PATH=\"$HOME/.npm-global/bin:$PATH\" mise-build.bat runGenerator"
runGenerator = "PATH=\"$HOME/.npm-global/bin:$PATH\" mise-build.bat runGenerator"
gen-clean = "rm -rf /tmp/ai-code-generated/"