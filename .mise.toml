[tools]
java = "17"

[tasks]
build = "bash gradlew build"
test = "bash gradlew test"
run-ide = "bash gradlew runIde"
run = "bash gradlew runIde"
clean = "bash gradlew clean"
check = "bash gradlew check"
assemble = "bash gradlew assemble"
install = "bash gradlew installDist"
gen = "PATH=\"$HOME/.npm-global/bin:$PATH\" bash gradlew runGenerator"
runGenerator = "PATH=\"$HOME/.npm-global/bin:$PATH\" bash gradlew runGenerator"
gen-clean = "rm -rf /tmp/ai-code-generated/"